<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Gallery11 VR Museum</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body{margin:0;}

.info{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:5px;
font-family:sans-serif;
}
</style>

</head>

<body>

<div class="info">
Gallery11 VR Museum<br>
WASDキーで歩く / マウスで視点
</div>

<a-scene>

<!-- カメラ -->
<a-entity position="0 1.6 10">
<a-camera wasd-controls look-controls>
<a-cursor></a-cursor>
</a-camera>
</a-entity>

<!-- 床 -->
<a-plane rotation="-90 0 0"
width="60"
height="60"
color="#e6e6e6">
</a-plane>

<!-- 天井 -->
<a-plane rotation="90 0 0"
position="0 10 0"
width="60"
height="60"
color="#ffffff">
</a-plane>

<!-- 正面の壁 -->
<a-box
position="0 5 -20"
width="40"
height="10"
depth="0.5"
color="#ffffff">
</a-box>

<!-- 左の壁 -->
<a-box
position="-20 5 0"
width="0.5"
height="10"
depth="40"
color="#ffffff">
</a-box>

<!-- 右の壁 -->
<a-box
position="20 5 0"
width="0.5"
height="10"
depth="40"
color="#ffffff">
</a-box>

<!-- ===== ゴッホ ひまわり（正面） ===== -->

<a-plane
position="0 5 -19.7"
width="8"
height="6"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Vase_with_Fifteen_Sunflowers.jpg/800px-Vase_with_Fifteen_Sunflowers.jpg">
</a-plane>

<a-text
value="Sunflowers - Vincent van Gogh"
position="0 2.5 -19.6"
align="center"
color="black"
width="20">
</a-text>

<!-- ===== 北斎（左壁） ===== -->

<a-plane
position="-19.7 5 0"
rotation="0 90 0"
width="8"
height="6"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/The_Great_Wave_off_Kanagawa.jpg/1024px-The_Great_Wave_off_Kanagawa.jpg">
</a-plane>

<a-text
value="Great Wave - Hokusai"
rotation="0 90 0"
position="-19.6 2.5 0"
align="center"
color="black"
width="20">
</a-text>

<!-- ===== モナリザ（右壁） ===== -->

<a-plane
position="19.7 5 0"
rotation="0 -90 0"
width="6"
height="8"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Mona_Lisa.jpg/800px-Mona_Lisa.jpg">
</a-plane>

<a-text
value="Mona Lisa - Leonardo da Vinci"
rotation="0 -90 0"
position="19.6 2.5 0"
align="center"
color="black"
width="20">
</a-text>

<!-- ===== モネ（天井） ===== -->

<a-plane
position="0 9.7 0"
rotation="90 0 0"
width="10"
height="8"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Claude_Monet_-_Water_Lilies_-_1906.jpg/1024px-Claude_Monet_-_Water_Lilies_-_1906.jpg">
</a-plane>

<a-text
value="Water Lilies - Claude Monet"
position="0 9.4 0"
rotation="90 0 0"
align="center"
color="black"
width="20">
</a-text>

<!-- 光 -->

<a-light type="ambient" intensity="0.9"></a-light>

<a-light
type="point"
position="0 8 0"
intensity="1.2">
</a-light>

</a-scene>

</body>
</html>
