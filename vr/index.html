<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>VR美術館</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js';
import { XRButton } from 'https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/webxr/XRButton.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 20);
camera.position.set(0, 1.6, 0); // VR目線高さ

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(XRButton.createButton(renderer));

// 美術館サイズ
const roomSize = 6;

// テクスチャURL
const textures = {
  right: 'https://satotakaaki0historien-rgb.github.io/ST-institut-de-recherche/vr/images/monalisa.jpg',
  left:  'https://upload.wikimedia.org/wikipedia/commons/0/0a/Claude_Monet_-_Water_Lilies_1916.jpg',
  top:   'https://upload.wikimedia.org/wikipedia/commons/0/0a/Great_Wave_off_Kanagawa.jpg',
  front:'https://upload.wikimedia.org/wikipedia/commons/4/47/Vincent_van_Gogh_-_Sunflowers_-_Google_Art_Project.jpg'
};

// ロード関数
function createWall(textureURL, position, rotation, width=roomSize, height=roomSize) {
  const loader = new THREE.TextureLoader();
  const geometry = new THREE.PlaneGeometry(width, height);
  const material = new THREE.MeshBasicMaterial({ map: loader.load(textureURL), side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(...position);
  mesh.rotation.set(...rotation);
  scene.add(mesh);
}

// 右壁面（モナリザ）
createWall(textures.right, [roomSize/2, roomSize/2, 0], [0, -Math.PI/2, 0]);

// 左壁面（睡蓮）
createWall(textures.left, [-roomSize/2, roomSize/2, 0], [0, Math.PI/2, 0]);

// 天井（北斎）
createWall(textures.top, [0, roomSize, 0], [-Math.PI/2, 0, 0]);

// 正面（ひまわり）
createWall(textures.front, [0, roomSize/2, -roomSize/2], [0, 0, 0]);

// 床（無地）
createWall('https://upload.wikimedia.org/wikipedia/commons/3/3d/White_tile_floor.jpg', [0,0,0], [Math.PI/2,0,0]);

// 簡易壁（背面）
createWall('https://upload.wikimedia.org/wikipedia/commons/3/3d/White_tile_floor.jpg', [0, roomSize/2, roomSize/2], [0, Math.PI, 0]);

// VRアニメーションループ
renderer.setAnimationLoop(() => {
  renderer.render(scene, camera);
});

// ウィンドウリサイズ
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
