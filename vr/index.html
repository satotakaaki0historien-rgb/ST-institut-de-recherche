<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Gallery 11 VR Museum</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body{margin:0;}
.info{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:5px;
font-family:sans-serif;
}
</style>
</head>

<body>

<div class="info">
Gallery11 VR Museum<br>
WASDキーで歩く / マウスで視点
</div>

<a-scene>

<!-- カメラ -->
<a-entity position="0 1.6 6">
<a-camera wasd-controls look-controls>
<a-cursor></a-cursor>
</a-camera>
</a-entity>

<!-- 床 -->
<a-plane rotation="-90 0 0"
width="30"
height="30"
color="#e5e5e5">
</a-plane>

<!-- 壁 -->
<a-box position="0 3 -10"
width="20"
height="6"
depth="0.3"
color="#ffffff">
</a-box>

<!-- ===== モナリザ ===== -->

<a-plane
position="-6 3 -9.8"
width="4"
height="3"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Mona_Lisa.jpg/800px-Mona_Lisa.jpg">
</a-plane>

<a-text
value="Mona Lisa - Leonardo da Vinci"
position="-6 1 -9.7"
align="center"
color="black"
width="10">
</a-text>

<!-- ===== 北斎 ===== -->

<a-plane
position="-2 3 -9.8"
width="4"
height="3"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/The_Great_Wave_off_Kanagawa.jpg/1024px-The_Great_Wave_off_Kanagawa.jpg">
</a-plane>

<a-text
value="Great Wave - Hokusai"
position="-2 1 -9.7"
align="center"
color="black"
width="10">
</a-text>

<!-- ===== ゴッホ 星月夜 ===== -->

<a-plane
position="2 3 -9.8"
width="4"
height="3"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/The_Starry_Night.jpg/1024px-The_Starry_Night.jpg">
</a-plane>

<a-text
value="Starry Night - Vincent van Gogh"
position="2 1 -9.7"
align="center"
color="black"
width="10">
</a-text>

<!-- ===== モネ 睡蓮 ===== -->

<a-plane
position="6 3 -9.8"
width="4"
height="3"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Claude_Monet_-_Water_Lilies_-_1906.jpg/1024px-Claude_Monet_-_Water_Lilies_-_1906.jpg">
</a-plane>

<a-text
value="Water Lilies - Claude Monet"
position="6 1 -9.7"
align="center"
color="black"
width="10">
</a-text>

<!-- 光 -->
<a-light type="ambient" intensity="0.8"></a-light>

<a-light
type="point"
position="0 6 0"
intensity="1.2">
</a-light>

</a-scene>

</body>
</html>
