<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Gallery11 VR Museum</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body{margin:0;}

.info{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
font-family:sans-serif;
}
</style>
</head>

<body>

<div class="info">
Gallery11 VR Museum<br>
WASDキーで歩く / マウスで視点
</div>

<a-scene>

<!-- カメラ -->
<a-entity position="0 1.6 15">
<a-camera wasd-controls look-controls>
<a-cursor></a-cursor>
</a-camera>
</a-entity>

<!-- 床 -->
<a-plane rotation="-90 0 0"
width="80"
height="80"
color="#eeeeee">
</a-plane>

<!-- 天井 -->
<a-plane rotation="90 0 0"
position="0 12 0"
width="80"
height="80"
color="#ffffff">
</a-plane>

<!-- 正面壁 -->
<a-box
position="0 6 -30"
width="60"
height="12"
depth="1"
color="#ffffff">
</a-box>

<!-- 左壁 -->
<a-box
position="-30 6 0"
width="1"
height="12"
depth="60"
color="#ffffff">
</a-box>

<!-- 右壁 -->
<a-box
position="30 6 0"
width="1"
height="12"
depth="60"
color="#ffffff">
</a-box>

<!-- ================= -->
<!-- ゴッホ ひまわり -->
<!-- 正面 -->
<!-- ================= -->

<a-plane
position="0 6 -29"
width="10"
height="8"
src="https://upload.wikimedia.org/wikipedia/commons/4/47/Vase_with_Fifteen_Sunflowers.jpg">
</a-plane>

<a-text
value="Sunflowers - Vincent van Gogh"
position="0 3 -28.8"
align="center"
width="30"
color="black">
</a-text>

<!-- ================= -->
<!-- 北斎 -->
<!-- 左壁 -->
<!-- ================= -->

<a-plane
position="-29 6 0"
rotation="0 90 0"
width="10"
height="8"
src="https://upload.wikimedia.org/wikipedia/commons/0/0a/The_Great_Wave_off_Kanagawa.jpg">
</a-plane>

<a-text
value="Great Wave - Hokusai"
rotation="0 90 0"
position="-28.8 3 0"
align="center"
width="30"
color="black">
</a-text>

<!-- ================= -->
<!-- モナリザ -->
<!-- 右壁 -->
<!-- ================= -->

<a-plane
position="29 6 0"
rotation="0 -90 0"
width="8"
height="10"
src="https://upload.wikimedia.org/wikipedia/commons/e/ec/Mona_Lisa.jpg">
</a-plane>

<a-text
value="Mona Lisa - Leonardo da Vinci"
rotation="0 -90 0"
position="28.8 3 0"
align="center"
width="30"
color="black">
</a-text>

<!-- ================= -->
<!-- モネ -->
<!-- 天井 -->
<!-- ================= -->

<a-plane
position="0 11.5 0"
rotation="90 0 0"
width="14"
height="10"
src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Claude_Monet_-_Water_Lilies_-_1906.jpg">
</a-plane>

<a-text
value="Water Lilies - Claude Monet"
rotation="90 0 0"
position="0 11.2 0"
align="center"
width="30"
color="black">
</a-text>

<!-- 光 -->
<a-light type="ambient" intensity="1"></a-light>

<a-light
type="point"
position="0 10 0"
intensity="1.2">
</a-light>

</a-scene>

</body>
</html>
