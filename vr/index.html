<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Gallery 11 VR Museum</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
}
.info{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:5px;
}
</style>
</head>

<body>

<div class="info">
Gallery 11 VR Museum<br>
WASDキーで移動 / マウスで視点
</div>

<a-scene xr-mode-ui="enabled: true">

<!-- カメラ（歩行） -->
<a-entity position="0 1.6 4">

<a-camera wasd-controls look-controls>

<a-cursor></a-cursor>

</a-camera>

</a-entity>

<!-- 床 -->
<a-plane rotation="-90 0 0"
width="20"
height="20"
color="#dddddd">
</a-plane>

<!-- 壁 -->
<a-box position="0 2 -8" width="16" height="4" depth="0.2" color="#ffffff"></a-box>
<a-box position="-8 2 0" width="0.2" height="4" depth="16" color="#ffffff"></a-box>
<a-box position="8 2 0" width="0.2" height="4" depth="16" color="#ffffff"></a-box>

<!-- ===== 展示作品1 ===== -->

<a-plane
position="-4 2 -7.8"
width="2"
height="1.5"
src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Mona_Lisa.jpg">
</a-plane>

<a-text
value="Mona Lisa\nLeonardo da Vinci"
position="-4 0.8 -7.7"
align="center"
color="black">
</a-text>

<!-- ===== 展示作品2 ===== -->

<a-plane
position="0 2 -7.8"
width="2"
height="1.5"
src="https://upload.wikimedia.org/wikipedia/commons/0/0a/The_Great_Wave_off_Kanagawa.jpg">
</a-plane>

<a-text
value="Great Wave\nHokusai"
position="0 0.8 -7.7"
align="center"
color="black">
</a-text>

<!-- ===== 展示作品3 ===== -->

<a-plane
position="4 2 -7.8"
width="2"
height="1.5"
src="https://upload.wikimedia.org/wikipedia/commons/5/56/Vincent_van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg">
</a-plane>

<a-text
value="Starry Night\nVan Gogh"
position="4 0.8 -7.7"
align="center"
color="black">
</a-text>

<!-- ===== 2階フロア ===== -->

<a-plane
position="0 4 0"
rotation="-90 0 0"
width="10"
height="10"
color="#eeeeee">
</a-plane>

<a-box position="0 3 -4" width="10" height="0.2" depth="2" color="#cccccc"></a-box>

<!-- 階段 -->

<a-box position="-6 0.5 -2" width="2" height="1" depth="2" color="#999"></a-box>
<a-box position="-6 1.5 -2" width="2" height="1" depth="2" color="#aaa"></a-box>
<a-box position="-6 2.5 -2" width="2" height="1" depth="2" color="#bbb"></a-box>

<!-- 2階展示 -->

<a-plane
position="0 5 -4"
width="3"
height="2"
src="https://upload.wikimedia.org/wikipedia/commons/a/a1/Claude_Monet_-_Water_Lilies_-_Google_Art_Project.jpg">
</a-plane>

<a-text
value="Water Lilies\nClaude Monet"
position="0 3.8 -4"
align="center"
color="black">
</a-text>

<!-- 光 -->
<a-light type="ambient" intensity="0.6"></a-light>

<a-light
type="point"
position="0 4 0"
intensity="1">
</a-light>

</a-scene>

</body>
</html>
