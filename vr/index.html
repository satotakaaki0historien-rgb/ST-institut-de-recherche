<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>gallery11 VR</title>

<style>
body{margin:0;overflow:hidden;background:black;}
#title{
position:absolute;
top:20px;
width:100%;
text-align:center;
color:white;
font-size:24px;
}
</style>

</head>

<body>

<div id="title">gallery11 VRギャラリー</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.HemisphereLight(0xffffff,0x444444);
scene.add(light);

camera.position.z = 5;

const loader = new THREE.TextureLoader();

function picture(img,x){

const texture = loader.load(img);

const geo = new THREE.PlaneGeometry(2,1.5);
const mat = new THREE.MeshBasicMaterial({map:texture});

const mesh = new THREE.Mesh(geo,mat);
mesh.position.set(x,0,-3);

scene.add(mesh);

}

picture("../DSCF12301.jpg",-3);
picture("../DSCF12321.jpg",0);
picture("../DSCF12341.jpg",3);

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
